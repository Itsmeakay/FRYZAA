<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    My Profile | Fryzaa
  </title>

  <link
    rel="stylesheet"
    href="./profile.css"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >

</head>

<body>

  <div class="profile-container">

    <div class="profile-card">

      <h1>
        My Profile
      </h1>

      <a
href="../Home/index.html"
class="back-home-btn"
>

  <i class="fa-solid fa-arrow-left"></i>

  Back To Home

</a>

      <!-- AVATAR -->

      <div class="avatar-section">

        <div
          id="selectedAvatar"
          class="selected-avatar"
        >

          😎

        </div>

        <div class="avatar-grid">

          <span class="avatar-option">
            😎
          </span>

          <span class="avatar-option">
            🤠
          </span>

          <span class="avatar-option">
            🤖
          </span>

          <span class="avatar-option">
            👽
          </span>

          <span class="avatar-option">
            🐼
          </span>

          <span class="avatar-option">
            🦊
          </span>

          <span class="avatar-option">
            🐯
          </span>

          <span class="avatar-option">
            🐧
          </span>

        </div>

      </div>

      <!-- NAME -->

      <div class="profile-field">

        <label>

          Full Name

        </label>

        <input
          type="text"
          id="profileName"
          placeholder="Enter your name"
        >

      </div>

      <!-- EMAIL -->

      <div class="profile-field">

        <label>

          Email

        </label>

        <input
          type="email"
          id="profileEmail"
          readonly
        >

      </div>

      <!-- PHONE -->

      <div class="profile-field">

        <label>

          Phone Number

        </label>

        <input
          type="text"
          id="profilePhone"
          placeholder="Enter phone number"
        >

      </div>

      <!-- SAVE BUTTON -->

      <button
        id="saveProfileBtn"
        class="save-profile-btn"
      >

        <i class="fa-solid fa-floppy-disk"></i>

        Save Changes

      </button>

    </div>

  </div>

  <script
    type="module"
    src="./profile.js"
  ></script>

</body>

</html>
