<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>

FRYZAA Sign Up

</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet"
>
<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
>

<link
rel="stylesheet"
href="./auth.css"
>

</head>

<body>

<div class="auth-container">

  <div class="auth-card">

    <div class="auth-logo">

      FRYZAA

    </div>

    <h1>

      Create Account 🍔

    </h1>

    <p>

      Join Fryzaa and start ordering.

    </p>

    <form id="signupForm">

      <div class="input-group">

        <label>

          Full Name

        </label>

        <input
          type="text"
          id="signupName"
          placeholder="Enter your full name"
          required
        >

      </div>

      <div class="input-group">

        <label>

          Phone Number

        </label>

        <input
          type="tel"
          id="signupPhone"
          placeholder="Enter phone number"
          required
        >

      </div>

      <div class="input-group">

        <label>

          Email

        </label>

        <input
          type="email"
          id="signupEmail"
          placeholder="Enter email"
          required
        >

      </div>

      <div class="input-group">

        <label>

          Password

        </label>

        <div class="password-box">

  <input
    type="password"
    id="signupPassword"
    placeholder="Create password"
    required
  >

  <i
    class="fa-regular fa-eye"
    id="toggleSignupPassword"
  ></i>

</div>
      

      <div class="input-group">

        <label>

          Confirm Password

        </label>

       <div class="password-box">

  <input
    type="password"
    id="confirmPassword"
    placeholder="Confirm password"
    required
  >

  <i
    class="fa-regular fa-eye"
    id="toggleConfirmPassword"
  ></i>

</div>
      <button
        type="submit"
        class="auth-btn"
      >

        Create Account

      </button>

      <div class="auth-footer">

        Already have an account?

        <a href="./login.html">

          Login

        </a>

      </div>

    </form>

  </div>

</div>

<script
type="module"
src="./signup.js"
></script>

</body>

</html>
