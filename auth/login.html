<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>

FRYZAA Login

</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet"
>
<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
>

<link
rel="stylesheet"
href="./auth.css"
>

</head>

<body>

<div class="auth-container">

  <div class="auth-card">

    <div class="auth-logo">

      FRYZAA

    </div>

    <h1>

      Welcome Back 👋

    </h1>

    <p>

      Login to continue ordering.

    </p>

    <form id="loginForm">
        <div class="input-group">

  <label>

    Email

  </label>

  <input
    type="email"
    id="loginEmail"
    placeholder="Enter your email"
    required
  >

</div>

<div class="input-group">

  <label>

    Password

  </label>

  <div class="password-box">

    <input
      type="password"
      id="loginPassword"
      placeholder="Enter password"
      required
    >

    <i
      class="fa-regular fa-eye"
      id="toggleLoginPassword"
    ></i>

  </div>

</div>

<div class="forgot-password">

  <a
  href="#"
  id="forgotPasswordBtn"
  >

    Forgot Password?

  </a>

</div>
<button
  type="submit"
  class="auth-btn"
>

  Login

</button>


<div class="auth-footer">

  Don't have an account?

  <a href="./signup.html">

    Sign Up

  </a>

</div>
</form>

  </div>

</div>

<script
type="module"
src="./login.js"
></script>

</body>

</html>
